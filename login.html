<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f766e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Cart Manager" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/icon-192.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./icons/icon-192.svg" />
  <title>Personal Cart Manager - Login</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="login-page">
  <div class="login-overlay"></div>
  <div class="container login-container">
    <div class="card login-card">
      <h1>Personal Cart Manager</h1>
      <p class="muted login-subtitle">Smart price list and shared cart across your devices.</p>

      <div class="auth-mode">
        <button id="modeSignInBtn" class="active">Sign In</button>
        <button id="modeSignUpBtn" class="secondary">Sign Up</button>
      </div>

      <div id="signinFields" class="login-form">
        <input id="identifierInput" class="login-input" type="text" placeholder="Email or Username" />
        <input id="signinPasswordInput" class="login-input" type="password" placeholder="Password" />
        <label class="password-toggle">
          <input id="signinShowPassword" type="checkbox" />
          <span>Show password</span>
        </label>
      </div>

      <div id="signupFields" class="login-form hidden">
        <input id="nameInput" class="login-input" type="text" placeholder="Full name" />
        <input id="signupEmailInput" class="login-input" type="email" placeholder="Email" />
        <input id="signupUsernameInput" class="login-input" type="text" placeholder="Username" />
        <input id="signupPasswordInput" class="login-input" type="password" placeholder="Password" />
        <input id="signupConfirmPasswordInput" class="login-input" type="password" placeholder="Confirm password" />
        <label class="password-toggle">
          <input id="signupShowPassword" type="checkbox" />
          <span>Show password</span>
        </label>
      </div>

      <div class="auth-actions" style="margin-top: 10px;">
        <button id="submitBtn">Continue</button>
      </div>
      <p id="status" class="muted" style="margin-top: 10px;">Sign in to access your synced data.</p>
    </div>
  </div>

  <script type="module" src="./login.js"></script>
  <script src="./pwa-register.js"></script>
</body>
</html>
